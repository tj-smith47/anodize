name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-pc-windows-gnu
          - os: macos-latest
            targets: x86_64-apple-darwin,aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}

      # Zig + cargo-zigbuild for cross-compilation (cross: auto prefers zigbuild)
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      # UPX (matches .anodize.yaml upx.targets)
      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq upx

      - name: Install UPX (macOS x86_64)
        if: runner.os == 'macOS'
        run: brew install upx

      # Bootstrap anodize from source
      - name: Build anodize
        shell: bash
        run: cargo build --release -p anodize

      # Upload the anodize binary for reuse in the release job (Linux only)
      - name: Upload anodize binary
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: anodize-linux
          path: target/release/anodize

      # Run split build — on Linux, build both linux and windows targets
      - name: Run anodize release --split (native targets)
        shell: bash
        run: ./target/release/anodize release --split --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # On Linux, also build windows targets via zigbuild cross-compilation
      - name: Run anodize release --split (windows targets)
        if: runner.os == 'Linux'
        shell: bash
        run: ./target/release/anodize release --split
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          ANODIZE_OS: windows

      - name: Upload split artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: dist/

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Install anodize from the build job artifact (skip cargo build)
      - uses: tj-smith47/anodize-action@v1
        with:
          from-artifact: anodize-linux
          install-only: true

      # nFPM for deb/rpm/apk packaging
      - name: Install nFPM
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -q
          sudo apt-get install -yq nfpm

      # Download all split artifacts into dist/
      - name: Download split artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Verify split artifacts
        run: |
          echo "Split contexts found:"
          find dist -name context.json -type f
          COUNT=$(find dist -name context.json -type f | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No split context files found in dist/"
            exit 1
          fi
          echo "Found $COUNT split context(s)"

      # Import GPG key for checksum signing (skipped if secret not configured)
      - name: Import GPG key
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          else
            echo "GPG_PRIVATE_KEY not set, skipping"
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      # Install cosign for binary/docker signing
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Install makeself for self-extracting archives
      - name: Install makeself
        run: sudo apt-get install -yq makeself

      # Merge artifacts and run post-build pipeline:
      # archive → nfpm → changelog → source → sbom → checksum → sign →
      # release (GitHub) → publish (crates.io, homebrew, scoop, etc.) → announce
      - name: Run anodize release --merge
        run: anodize release --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
