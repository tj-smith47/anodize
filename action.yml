name: "Anodizer"
description: "Release Rust projects with Anodizer"
branding:
  icon: "package"
  color: "orange"

inputs:
  version:
    description: "Anodizer version to install (e.g., v0.1.0). Defaults to latest."
    required: false
    default: "latest"
  args:
    description: "Arguments to pass to anodizer (e.g., 'release --snapshot')"
    required: false
    default: "release"
  install-only:
    description: "Only install anodizer, don't run it"
    required: false
    default: "false"
  workdir:
    description: "Working directory for anodizer"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Install Anodizer
      shell: bash
      run: |
        set -euo pipefail

        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          cargo install anodizer --locked
        else
          cargo install anodizer --version "${VERSION#v}" --locked
        fi

        echo "Anodizer installed: $(anodizer --version)"

    - name: Run Anodizer
      if: inputs.install-only != 'true'
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        ANODIZER_ARGS: ${{ inputs.args }}
      run: anodizer $ANODIZER_ARGS
