project_name: anodize

defaults:
  targets:
    - x86_64-unknown-linux-gnu
    - aarch64-unknown-linux-gnu
    - x86_64-apple-darwin
    - aarch64-apple-darwin
    - x86_64-pc-windows-msvc
    - aarch64-pc-windows-msvc
  cross: auto
  flags: --release
  archives:
    format: tar.gz
    format_overrides:
      - os: windows
        format: zip
  checksum:
    algorithm: sha256

before:
  hooks:
    - cargo fmt --check
    - cargo clippy -- -D warnings
    - cargo test

crates:
  - name: anodize
    path: crates/cli
    tag_template: "v{{ Version }}"
    builds:
      - binary: anodize
    archives:
      - name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}"
        files:
          - LICENSE
          - README.md
    checksum:
      name_template: "{{ ProjectName }}-{{ Version }}-checksums.txt"
    release:
      github:
        owner: tj-smith47
        name: anodize
      prerelease: auto
    publish:
      crates: true
      homebrew:
        tap:
          owner: tj-smith47
          name: homebrew-tap
        folder: Formula
        description: "A Rust-native release automation tool"
        license: MIT
        install: |
          bin.install "anodize"
        test: |
          system "#{bin}/anodize", "--version"
      scoop:
        bucket:
          owner: tj-smith47
          name: scoop-bucket
        description: "A Rust-native release automation tool"
        license: MIT

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat"
    - title: Bug Fixes
      regexp: "^fix"
    - title: Others
      order: 999

snapshot:
  name_template: "{{ Version }}-SNAPSHOT-{{ ShortCommit }}"
